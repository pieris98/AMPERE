version: '3.8'

services:
  dima:
    build:
      context: .
      dockerfile: DiMA/Dockerfile
    image: dima:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface:/workspace/phd/DiMA/.cache/huggingface
      - ./DiMA/checkpoints:/workspace/phd/DiMA/checkpoints
    environment:
      - WANDB_MODE=offline
    command: ["python", "example_simple.py"]

  fastplms:
    build:
      context: .
      dockerfile: FastPLMs/Dockerfile
    image: fastplms:latest
